services:
  broker:
    image: confluentinc/cp-kafka:7.6.1
    container_name: safestream-broker
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:29093"
      KAFKA_LISTENERS: "PLAINTEXT://broker:29092,CONTROLLER://broker:29093,EXTERNAL://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "broker:29092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 12
    volumes:
      - broker-data:/var/lib/kafka/data

  topics:
    build: .
    image: safekafka-app:latest
    command: python -m scripts.create_topics --replicas 1
    environment: &app-env
      KAFKA_BOOTSTRAP_SERVERS: broker:29092
      KAFKA_API_KEY: ""
      KAFKA_API_SECRET: ""
      USE_LOCAL_BROKER: "true"
      TOPIC_FRAMES: cctv-frames
      TOPIC_DETECTIONS: safety-detections
      TOPIC_ALERTS: safety-alerts
      DETECTOR_WEIGHTS: previous_weights/best.pt
      DETECTOR_DEVICE: cpu
      DETECTOR_CONF: "0.25"
      AGG_WINDOW_SECONDS: "60"
      AGG_UNSAFE_RATIO_ALERT: "0.30"
      AGG_MIN_WINDOW_OBS: "5"
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: "8000"
    depends_on:
      broker:
        condition: service_healthy
    restart: "no"

  dashboard:
    build: .
    image: safekafka-app:latest
    command: python -m safestream.dashboard
    environment: *app-env
    ports:
      - "8000:8000"
    depends_on:
      topics:
        condition: service_completed_successfully
    restart: unless-stopped

  detector:
    build: .
    image: safekafka-app:latest
    command: python -m safestream.detector
    environment: *app-env
    depends_on:
      topics:
        condition: service_completed_successfully
    restart: unless-stopped

  producer:
    build: .
    image: safekafka-app:latest
    command: >
      python -m safestream.producer
      --video-dir /demo-videos
      --cameras cam-01,cam-02
      --shuffle
      --loop
      --realtime
    environment: *app-env
    volumes:
      - ${DEMO_VIDEO_DIR:-./demo_videos}:/demo-videos:ro
    depends_on:
      detector:
        condition: service_started
      dashboard:
        condition: service_started
    restart: unless-stopped

volumes:
  broker-data:
