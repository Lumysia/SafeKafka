<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>SafeStream-Kafka Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --bg: #0f1115;
    --card: #181b22;
    --text: #e6e8ee;
    --muted: #8a93a3;
    --safe: #2ecc71;
    --unsafe: #e74c3c;
    --warn: #f39c12;
    --high: #c0392b;
    --accent: #7d3c98;
    --border: #262a33;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 22px; border-bottom: 1px solid var(--border);
    background: linear-gradient(90deg, #15171d, #1c1f28);
  }
  header h1 { margin: 0; font-size: 18px; letter-spacing: 0.4px; }
  header .pill {
    font-size: 12px; color: var(--muted); padding: 4px 10px;
    border: 1px solid var(--border); border-radius: 999px;
  }
  main { padding: 18px 22px 60px; }
  .grid {
    display: grid; gap: 14px;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
  }
  .card h3 {
    margin: 0 0 6px; font-size: 14px; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.8px;
  }
  .card .cam { font-size: 18px; font-weight: 700; margin-bottom: 10px; }
  .row { display: flex; justify-content: space-between; padding: 4px 0; }
  .row .k { color: var(--muted); font-size: 13px; }
  .row .v { font-weight: 600; }
  .v.safe { color: var(--safe); }
  .v.unsafe { color: var(--unsafe); }
  .bar { height: 8px; border-radius: 4px; background: #20242d; margin-top: 8px; overflow: hidden; }
  .bar > div { height: 100%; transition: width 0.4s ease; }
  .ratio { display: flex; justify-content: space-between; align-items: baseline; margin-top: 10px; }
  .ratio .big { font-size: 28px; font-weight: 700; }
  .ratio .lbl { color: var(--muted); font-size: 12px; }
  .severity-WARN { color: var(--warn); }
  .severity-HIGH { color: var(--high); }
  .alerts {
    margin-top: 20px; background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 14px 16px;
  }
  .alerts h2 { margin: 0 0 8px; font-size: 14px; color: var(--muted);
               text-transform: uppercase; letter-spacing: 0.8px; }
  #alerts {
    max-height: 320px; overflow-y: auto;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  #alerts::-webkit-scrollbar { width: 6px; }
  #alerts::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  .alert-row {
    display: grid; grid-template-columns: 80px 110px 1fr;
    padding: 6px 0; border-bottom: 1px dashed var(--border);
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 13px;
  }
  .alert-label { color: var(--unsafe); font-style: italic; }
  .empty { color: var(--muted); padding: 8px 0; font-style: italic; }
  footer { color: var(--muted); font-size: 12px; padding: 10px 22px; }
  .violations { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 10px; }
  .violations .lbl { color: var(--muted); font-size: 11px; text-transform: uppercase;
                     letter-spacing: 0.8px; margin-bottom: 6px; }
  .vrow { display: flex; justify-content: space-between; align-items: center;
          padding: 3px 0; font-size: 13px; }
  .vrow .vname { color: var(--text); }
  .vrow .vcount { color: var(--unsafe); font-weight: 600; min-width: 28px; text-align: right; }
  .vbar-wrap { flex: 1; margin: 0 8px; height: 4px; background: #20242d; border-radius: 2px; overflow: hidden; }
  .vbar { height: 100%; background: var(--unsafe); border-radius: 2px; transition: width 0.4s ease; }
  .safe-bar { background: var(--safe); }
  .vrow .safe-count { color: var(--safe); font-weight: 600; min-width: 28px; text-align: right; }
  .unit { font-weight: 400; text-transform: none; letter-spacing: 0; color: var(--muted); font-size: 10px; }
  .cam-frame {
    width: 100%; aspect-ratio: 16/9; background: #0a0c10;
    border-radius: 8px; margin-bottom: 10px; object-fit: contain;
    border: 1px solid var(--border); display: block;
  }
  .badge-offline {
    display: inline-block; font-size: 10px; font-weight: 700;
    padding: 2px 7px; border-radius: 999px; margin-left: 8px;
    background: #3d1a1a; color: var(--unsafe); letter-spacing: 0.5px;
    vertical-align: middle;
  }
  .last-viol {
    margin-top: 10px; padding: 7px 10px;
    background: #1e1215; border: 1px solid #3d1a1a; border-radius: 8px;
  }
  .last-viol-thumb {
    width: 100%; aspect-ratio: 16/9; object-fit: contain;
    border-radius: 4px; margin-bottom: 5px; display: block; background: #0a0c10;
  }
  .last-viol-label { color: var(--unsafe); font-weight: 600; font-size: 13px; }
  .last-viol-meta  { color: var(--muted); font-size: 11px; margin-top: 2px; }
</style>
</head>
<body>
  <header>
    <h1>SafeStream-Kafka — Live Safety Dashboard</h1>
    <div>
      <span class="pill" id="status">connecting...</span>
      <span class="pill" id="settings"></span>
    </div>
  </header>

  <main>
    <div id="cameras" class="grid">
      <div class="empty card">Waiting for the first detections on
        <code id="topic">safety-detections</code>...</div>
    </div>

    <section class="alerts">
      <h2>Recent alerts</h2>
      <div id="alerts"><div class="empty">no alerts yet.</div></div>
    </section>
  </main>

  <footer>SafeStream-Kafka · producer → detector → aggregator → dashboard ·
    Confluent Cloud Kafka</footer>

<script>
  const $ = (id) => document.getElementById(id);

  function fmtRatio(r) {
    return (100 * (r || 0)).toFixed(1) + '%';
  }
  function fmtTime(ts) {
    if (!ts) return '';
    const d = new Date(Number(ts) * 1000);
    return d.toLocaleTimeString();
  }
  function ratioColor(r) {
    if (r >= 0.60) return 'var(--high)';
    if (r >= 0.30) return 'var(--warn)';
    return 'var(--safe)';
  }

  function fmtAgo(ts) {
    if (!ts) return '';
    const s = Math.round(Date.now() / 1000 - ts);
    if (s < 60)   return `${s}s ago`;
    if (s < 3600) return `${Math.floor(s / 60)}m ago`;
    return `${Math.floor(s / 3600)}h ago`;
  }

  const _knownCams = new Set();

  function refreshFrames(cams) {
    for (const cam of Object.keys(cams || {})) _knownCams.add(cam);
    for (const cam of _knownCams) {
      const img = document.getElementById('frame-' + cam);
      if (!img) continue;
      const next = new Image();
      next.onload = () => { img.src = next.src; img.style.visibility = 'visible'; };
      next.src = `/api/frame/${encodeURIComponent(cam)}?t=${Date.now()}`;
    }
  }

  function refreshViolationFrames(cams) {
    for (const cam of Object.keys(cams || {})) {
      const img = document.getElementById('vframe-' + cam);
      if (!img) continue;
      const next = new Image();
      next.onload = () => { img.src = next.src; img.style.display = 'block'; };
      next.src = `/api/violation-frame/${encodeURIComponent(cam)}?t=${Date.now()}`;
    }
  }

  function renderViolations(counts) {
    if (!counts || Object.keys(counts).length === 0) return '';
    const entries = Object.entries(counts);
    const max = entries[0][1];
    const rows = entries.map(([label, n]) => `
      <div class="vrow">
        <span class="vname">${label}</span>
        <div class="vbar-wrap"><div class="vbar" style="width:${(100*n/max).toFixed(1)}%"></div></div>
        <span class="vcount">${n}</span>
      </div>`).join('');
    return `<div class="violations"><div class="lbl">Violations <span class="unit">(detections)</span></div>${rows}</div>`;
  }

  function renderSafeCategories(counts) {
    if (!counts || Object.keys(counts).length === 0) return '';
    const entries = Object.entries(counts);
    const max = entries[0][1];
    const rows = entries.map(([label, n]) => `
      <div class="vrow">
        <span class="vname">${label}</span>
        <div class="vbar-wrap"><div class="vbar safe-bar" style="width:${(100*n/max).toFixed(1)}%"></div></div>
        <span class="vcount safe-count">${n}</span>
      </div>`).join('');
    return `<div class="violations"><div class="lbl">Safe categorizations <span class="unit">(detections)</span></div>${rows}</div>`;
  }

  function renderCameras(cams, frameAges) {
    const root = $('cameras');
    const entries = Object.entries(cams || {});
    if (entries.length === 0) {
      root.innerHTML =
        '<div class="empty card">Waiting for the first detections on ' +
        '<code>safety-detections</code>...</div>';
      return;
    }
    root.innerHTML = '';
    entries.sort((a, b) => a[0].localeCompare(b[0]));
    for (const [cam, v] of entries) {
      const total = (v.cumulative_safe || 0) + (v.cumulative_unsafe || 0);
      const safePct = total ? (100 * v.cumulative_safe / total) : 0;
      const ratio = v.rolling_ratio || 0;
      const c = ratioColor(ratio);
      const ageSec = frameAges && frameAges[cam] != null ? frameAges[cam] : 0;
      const offlineBadge = ageSec > 30 ? '<span class="badge-offline">OFFLINE</span>' : '';
      const lv = v.last_violation;
      const lastViolHtml = lv ? `
        <div class="last-viol">
          <img class="last-viol-thumb" id="vframe-${cam}"
               src="/api/violation-frame/${encodeURIComponent(cam)}"
               alt="violation" onerror="this.style.display='none'" />
          <div class="last-viol-label">${lv.label}</div>
          <div class="last-viol-meta">${(lv.conf * 100).toFixed(0)}% conf · ${fmtAgo(lv.timestamp)}</div>
        </div>` : '';
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h3>Camera</h3>
        <div class="cam">${cam}${offlineBadge}</div>
        <img class="cam-frame" id="frame-${cam}"
             src="/api/frame/${encodeURIComponent(cam)}"
             alt="cam feed" onerror="this.style.visibility='hidden'" />
        <div class="row"><span class="k">total frames <span class="unit">(processed)</span></span>
                         <span class="v">${v.cumulative_frames || 0}</span></div>
        <div class="row"><span class="k">total safe <span class="unit">(detections)</span></span>
                         <span class="v safe">${v.cumulative_safe || 0}</span></div>
        <div class="row"><span class="k">total unsafe <span class="unit">(detections)</span></span>
                         <span class="v unsafe">${v.cumulative_unsafe || 0}</span></div>
        <div class="bar">
          <div style="width:${safePct.toFixed(1)}%; background: var(--safe);"></div>
        </div>
        <div class="ratio">
          <div>
            <div class="lbl">rolling unsafe ratio</div>
            <div class="big" style="color:${c}">${fmtRatio(ratio)}</div>
          </div>
          <div style="text-align:right">
            <div class="lbl">rolling unsafe / total</div>
            <div>${v.rolling_unsafe || 0} / ${v.rolling_total || 0}</div>
          </div>
        </div>
        ${lastViolHtml}
        ${renderSafeCategories(v.safe_label_counts)}
        ${renderViolations(v.violation_counts)}
      `;
      root.appendChild(card);
    }
  }

  function renderAlerts(alerts) {
    const root = $('alerts');
    if (!alerts || alerts.length === 0) {
      root.innerHTML = '<div class="empty">no alerts yet.</div>';
      return;
    }
    root.innerHTML = '';
    const sorted = alerts.slice().reverse();
    for (const a of sorted) {
      const row = document.createElement('div');
      row.className = 'alert-row';
      const labelPart = a.violation_label
        ? `<span class="alert-label">${a.violation_label}</span> · ` : '';
      row.innerHTML = `
        <span class="severity-${a.severity}">${a.severity}</span>
        <span>${fmtTime(a.timestamp)}</span>
        <span>${a.camera_id} — ${labelPart}ratio ${fmtRatio(a.rolling_ratio)} (${a.rolling_unsafe}/${a.rolling_total})</span>
      `;
      root.appendChild(row);
    }
  }

  async function bootstrap() {
    try {
      const r = await fetch('/api/snapshot');
      const j = await r.json();
      $('settings').textContent =
        `window=${j.settings.window_seconds}s  ratio≥${j.settings.unsafe_ratio_alert}`;
      $('topic').textContent = j.settings.topic_detections;
      renderCameras(j.cameras, {});
      refreshFrames(j.cameras);
      refreshViolationFrames(j.cameras);
    } catch (e) { /* ignore */ }
  }

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    ws.onopen   = () => { $('status').textContent = 'connected'; };
    ws.onclose  = () => {
      $('status').textContent = 'reconnecting...';
      setTimeout(connect, 1500);
    };
    ws.onerror  = () => { $('status').textContent = 'error'; };
    ws.onmessage = (ev) => {
      try {
        const data = JSON.parse(ev.data);
        renderCameras(data.cameras, data.frame_ages);
        renderAlerts(data.recent_alerts);
        refreshFrames(data.cameras);
        refreshViolationFrames(data.cameras);
      } catch (e) { /* ignore */ }
    };
  }

  bootstrap().then(connect);
</script>
</body>
</html>
